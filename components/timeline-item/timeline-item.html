<link rel="stylesheet" href="{baseUrl}css/global.css">

<div class="timeline-item">

            <span class="time-text start">August 2023</span>

            <span class="time-text end">Present</span>
        </div>
    </div>

    <div class="job-container">
        <p class="work-title work">Unity Developer Mentor</p>

        gap: 10px;
        box-sizing: border-box;
    }

    .timeline-header {
        display: flex;
        align-items: center;
    }

    .time-range {

        align-items: center;
        gap: 6px;
    }

    .time-text {
        font-size: 0.78rem;
        font-weight: 500;
        color: var(--accent, #7c6fff);
        letter-spacing: 0.01em;
    }

    .time-sep {
        font-size: 0.78rem;
        color: rgba(124, 111, 255, 0.5);
    }

    .job-container {
        display: flex;
        flex-direction: column;
        gap: 2px;
    }

    .work-title {
